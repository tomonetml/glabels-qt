name: Windows build

on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Acquire vcpkg
        uses: actions/checkout@v5
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Bootstrap vcpkg
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Enable GitHub Actions cache backend for vcpkg
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '')
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '')

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          ./vcpkg/vcpkg install pkgconf zlib libqrencode zint
          echo "TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.*'
          install-deps: 'true'
          cache: 'true'
          archives: 'qtbase qtsvg qttools icu qttranslations'

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }}
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}\stage
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release --prefix "${{ github.workspace }}\stage"

      - name: Upload installed app
        uses: actions/upload-artifact@v4
        with:
          name: glabels-qt-windows
          path: stage/**
