name: Windows build

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      CMAKE_BUILD_PARALLEL_LEVEL: 4
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Acquire vcpkg
        uses: actions/checkout@v5
        with:
          repository: microsoft/vcpkg
          path: vcpkg

      - name: Bootstrap vcpkg
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Enable GitHub Actions cache backend for vcpkg
        uses: actions/github-script@v8
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '')
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '')

      - name: Install vcpkg dependencies
        shell: bash
        run: |
          ./vcpkg/vcpkg install pkgconf zlib libqrencode zint
          echo "TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" >> $GITHUB_ENV

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.2.*'
          install-deps: 'true'
          cache: 'true'
          archives: 'qtbase qtsvg qttools icu qttranslations'

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_C_COMPILER=cl
          -DCMAKE_CXX_COMPILER=cl
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt runtime
        shell: pwsh
        run: |
          $windeployqt = (Get-Command windeployqt).Source
          & $windeployqt --release --compiler-runtime "$env:GITHUB_WORKSPACE\build\glabels\Release\glabels-qt.exe"
          if (Test-Path "$env:GITHUB_WORKSPACE\build\glabels-batch\Release\glabels-batch-qt.exe") {
            & $windeployqt --release --compiler-runtime "$env:GITHUB_WORKSPACE\build\glabels-batch\Release\glabels-batch-qt.exe"
          }

      - name: Smoke test
        shell: pwsh
        working-directory: ${{ github.workspace }}\build
        env:
          QT_ASSUME_STDERR_HAS_CONSOLE: 1
        run: |
          .\glabels-batch\Release\glabels-batch-qt.exe --Version

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: glabels-qt-windows
          path: |
            build/glabels/Release/**
            build/glabels-batch/Release/**
            build/model/**
            build/translations/**
